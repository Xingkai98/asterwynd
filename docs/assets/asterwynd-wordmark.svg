<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Asterwynd wordmark</title>
  <desc id="desc">A minimal Asterwynd wordmark with a star and slogan.</desc>
  <defs>
    <linearGradient id="wordmarkGradient" x1="210" y1="110" x2="1030" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.45" stop-color="#123B5D"/>
      <stop offset="1" stop-color="#8A5A10"/>
    </linearGradient>
    <linearGradient id="starGradient" x1="115" y1="48" x2="115" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE7A3"/>
      <stop offset="1" stop-color="#D99B1D"/>
    </linearGradient>
  </defs>

  <g transform="translate(124 98)">
    <path d="M0 -48L12.8 -12.8L48 0L12.8 12.8L0 48L-12.8 12.8L-48 0L-12.8 -12.8L0 -48Z" fill="url(#starGradient)"/>
    <path d="M0 -48L12.8 -12.8L48 0L12.8 12.8L0 48L-12.8 12.8L-48 0L-12.8 -12.8L0 -48Z" stroke="#A86B06" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M0 -25L6.7 -6.7L25 0L6.7 6.7L0 25L-6.7 6.7L-25 0L-6.7 -6.7L0 -25Z" fill="#FFF8DB" opacity="0.84"/>
  </g>

  <text x="210" y="135"
        fill="url(#wordmarkGradient)"
        font-family="Georgia, 'Times New Roman', 'DejaVu Serif', serif"
        font-size="124"
        font-style="italic"
        font-weight="700"
        letter-spacing="1.2">
    Asterwynd
  </text>

  <text x="214" y="202"
        fill="#5E6B7A"
        font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="29"
        font-weight="500"
        letter-spacing="0.4">
    Navigate by stars. Prove with traces.
  </text>
</svg>
