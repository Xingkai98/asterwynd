        font-family="'Arial Black', 'DejaVu Sans', 'Helvetica Neue', Arial, sans-serif"
        font-size="110"
        font-style="italic"
        font-weight="900"
        letter-spacing="0">
    Asterwynd
  </text>

  <text x="197" y="215"
        fill="#64748B"
        font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace"
        font-size="29"
        font-weight="500"
