<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Asterwynd wordmark</title>
  <desc id="desc">A minimal Asterwynd wordmark with a star and slogan.</desc>
  <defs>
    <linearGradient id="wordmarkGradient" x1="195" y1="116" x2="790" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08213A"/>
      <stop offset="0.24" stop-color="#006EA8"/>
      <stop offset="0.46" stop-color="#058BD3"/>
      <stop offset="0.64" stop-color="#4D63EE"/>
      <stop offset="0.80" stop-color="#8B3DD2"/>
      <stop offset="0.93" stop-color="#BD5577"/>
      <stop offset="1" stop-color="#E08312"/>
    </linearGradient>
  </defs>

  <g transform="translate(120 88)">
    <path d="M0 -42L11 -11L43 0L11 11L0 42L-11 11L-43 0L-11 -11L0 -42Z" fill="#FFF7D6"/>
    <path d="M0 -42L11 -11L43 0L11 11L0 42L-11 11L-43 0L-11 -11L0 -42Z" stroke="#EAB308" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <text x="196" y="134"
