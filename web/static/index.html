<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MyAgent Web UI</title>
<link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
<div id="app">
  <header>
    <h1>MyAgent</h1>
    <nav id="tabs">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab" data-tab="debug" id="debug-tab" style="display:none">Debug</button>
    </nav>
    <div id="identity-bar" aria-label="runtime identifiers">
      <span>Session <code id="session-id">pending</code></span>
      <span>Run <code id="run-id">none</code></span>
      <span>Mode <code id="mode-value">build</code></span>
      <div id="mode-controls">
        <select id="mode-select" aria-label="Mode">
          <option value="build">build</option>
          <option value="read_only">read_only</option>
          <option value="plan">plan</option>
        </select>
        <button id="mode-apply" type="button">Apply</button>
      </div>
    </div>
    <span id="status"></span>
  </header>

  <main>
    <!-- Chat View -->
    <section id="chat-view" class="view active">
      <div id="plan-document-panel" class="plan-document-panel" hidden>
        <div class="plan-document-header">Plan Document</div>
        <div id="plan-document-title" class="plan-document-title"></div>
        <div id="plan-document-body" class="markdown-body"></div>
      </div>
      <div id="planning-panel" class="planning-panel" hidden>
        <div class="planning-panel-header">Plan</div>
        <ol id="planning-items" class="planning-items"></ol>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <textarea id="user-input" placeholder="输入消息..." rows="2"></textarea>
        <button id="send-btn">发送</button>
      </div>
    </section>

    <!-- Debug View -->
    <section id="debug-view" class="view">
      <div id="debug-content"></div>
    </section>
  </main>
</div>

<script src="/static/markdown.js?v=6"></script>
<script src="/static/chat.js?v=8"></script>
<script src="/static/debug.js?v=6"></script>
</body>
</html>
