agent:
  default_mode: build

modes:
  build:
    deny_tools: []
  read_only:
    deny_tools: []
  plan:
    deny_tools: []

tools:
  ignore_patterns: []
  command_denylist: []
  display:
    max_result_chars: 4000
    max_result_lines: 80
    preview_chars: 1200

benchmark:
  parallel: 1
  timeout_seconds: 600
