agent:
  default_mode: build

modes:
  build:
    deny_tools: []
  read_only:
    deny_tools: []
  plan:
    deny_tools: []

tools:
  ignore_patterns: []
  command_denylist: []
  code_intelligence:
    tree_sitter_max_file_bytes: 262144
  web_search:
    providers:
      # Tavily 需要 MYAGENT_TAVILY_API_KEY。
      # - name: tavily
      #   enabled: true
      - name: duckduckgo-html
        enabled: true
      # Brave 需要 MYAGENT_BRAVE_SEARCH_API_KEY。
      # - name: brave
      #   enabled: true
      # SearXNG 需要 MYAGENT_SEARXNG_BASE_URL。
      # - name: searxng
      #   enabled: true
  display:
    max_result_chars: 4000
    max_result_lines: 80
    preview_chars: 1200

benchmark:
  parallel: 1
  timeout_seconds: 600
