name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run tests
        run: uv run pytest -q

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@1.4.1 validate --all --strict

      - name: Check OpenSpec artifacts
        run: uv run python scripts/check_openspec_artifacts.py
